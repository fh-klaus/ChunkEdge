name: Publish Website
on:
  push:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

    # Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Rust toolchain and cache
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: "1.92.0"
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build website
        run: |
          RUSTDOCFLAGS='--cfg unstable_doc --html-in-header docs/rustdoc-header.html' cargo doc --no-deps --workspace --all-features

          cat > target/doc/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <title>Redirecting…</title>
              <meta http-equiv="refresh" content="0; url=./chunkedge/">
              <link rel="canonical" href="./chunkedge/">
              <script>
                window.location.replace("./chunkedge/");
              </script>
            </head>
            <body>
              <p>Redirecting to <a href="./chunkedge/">ChunkEdge documentation</a>…</p>
            </body>
          </html>
          EOF

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./target/doc

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
